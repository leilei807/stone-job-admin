# Casdoor 对接配置（admin 端仅用于验签 Stone 用 client_credentials 签发的 JWT）
# 与 Stone 主工程 common-security 共用同一 Casdoor 实例、同一把公钥、同一套 clientId/secret

# Casdoor 实例地址
casdoor.endpoint=http://192.168.2.162:8000

# Casdoor 应用凭证（与 Stone common-security 中 security.casdoor.* 一致）
casdoor.client-id=afde7c88397ddd43144c
casdoor.client-secret=58b7e009a69dbedab494345d4478d2a319ba61af

# 回调地址（本期人类不登录 admin，预留）
casdoor.redirect-uri=http://192.168.2.189:8080/auth/login/callback

# Casdoor RSA 公钥（与 Stone 的 cert/casdoor-public.key 是同一把）
casdoor.public-key-path=classpath:cert/casdoor-public.key

# admin 端 xxl_job_user 中对应的服务账号 username（由 Stone clientToken 代表）
casdoor.service-account=casdoor_service

# JWT issuer（验签时校验，与 Casdoor 实例一致；留空则不强制校验 issuer）
casdoor.issuer=http://192.168.2.162:8000
